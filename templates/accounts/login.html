{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-5">

<div class="card shadow-lg">

<div class="card-body p-5">

<h2 class="text-center mb-4">

🔐 Login

</h2>

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label>Username</label>

<input
type="text"
name="username"
class="form-control"
placeholder="Enter Username"
required>

</div>

<div class="mb-3">

<label>Password</label>

<input
type="password"
name="password"
class="form-control"
placeholder="Enter Password"
required>

</div>

<div class="d-grid">

<button class="btn btn-primary">

Login

</button>

</div>

</form>

<hr>

<p class="text-center">

Don't have an account?

<a href="/register/">

Register

</a>

</p>

</div>

</div>

</div>

</div>

{% endblock %}
