<!DOCTYPE html>
<html>

<head>

<title>Interview History</title>

</head>

<body>

<h1>Interview History</h1>

<table border="1">

<tr>

<th>Date</th>

<th>Category</th>

<th>Score</th>

</tr>

{% for s in sessions %}

<tr>

<td>{{ s.created_at }}</td>

<td>{{ s.category }}</td>

<td>{{ s.score }}/10</td>

</tr>

{% endfor %}

</table>

</body>

</html>
